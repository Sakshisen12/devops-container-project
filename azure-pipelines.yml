trigger:
- main

variables:
  # ⚠️ Double check that these match your actual resource names!
  azureServiceConnection: 'Azure-Cloud-Connection' 
  acrLoginServer: 'sakshicr2026.azurecr.io'
  imageRepository: 'devopsapp'
  webAppName: 'sakshi-cloud-app'
  tag: '$(Build.BuildId)'

stages:
- stage: BuildAndPush
  displayName: 'Build and Push Stage'
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Task 1: Build the Docker image from your Dockerfile and push it straight into ACR
    - task: Docker@2
      displayName: 'Build and Push Image to ACR'
      inputs:
        containerRegistry: '$(azureServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: '$(tag)'

- stage: DeployToAzure
  displayName: 'Deploy Stage'
  dependsOn: BuildAndPush
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # Task 2: Update your Web App to stop running the quickstart placeholder and pull your new container instead
    - task: AzureWebAppContainer@1
      displayName: 'Deploy Container to Azure Web App'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        appName: '$(webAppName)'
        containers: '$(acrLoginServer)/$(imageRepository):$(tag)'